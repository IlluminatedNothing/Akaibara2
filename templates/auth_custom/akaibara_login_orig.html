<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akaibara Japanese Surplus — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Antique&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --orange: #E8531A;
    --green:  #4A7C59;
    --black:  #1A1A1A;
    --cream:  #F5F0E8;
    --warm:   #C9B99A;
  }

  body {
    min-height: 100vh;
    background-color: var(--black);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* geometric background inspired by the store walls */
  .bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }

  .bg-shape {
    position: absolute;
    opacity: 0.18;
  }

  .s1 { width: 420px; height: 420px; background: var(--orange); clip-path: polygon(0 0, 100% 30%, 70% 100%, 0 80%); top: -80px; left: -60px; }
  .s2 { width: 340px; height: 340px; background: var(--green);  clip-path: polygon(30% 0, 100% 0, 100% 100%, 0 70%); top: -40px; right: -40px; }
  .s3 { width: 280px; height: 280px; background: var(--orange); clip-path: polygon(50% 0, 100% 100%, 0 100%); bottom: 60px; left: 40px; }
  .s4 { width: 380px; height: 380px; background: var(--green);  clip-path: polygon(0 0, 100% 20%, 80% 100%, 20% 90%); bottom: -60px; right: -40px; }
  .s5 { width: 200px; height: 200px; background: var(--cream);  clip-path: polygon(50% 0, 100% 50%, 50% 100%, 0 50%); top: 45%; left: 8%; }
  .s6 { width: 160px; height: 160px; background: var(--orange); clip-path: polygon(0 30%, 70% 0, 100% 70%, 30% 100%); top: 30%; right: 6%; }

  /* noise overlay */
  .noise {
    position: fixed;
    inset: 0;
    z-index: 1;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    opacity: 0.4;
  }

  /* card */
  .card {
    position: relative;
    z-index: 2;
    width: 420px;
    background: rgba(245, 240, 232, 0.96);
    border-radius: 2px;
    padding: 48px 44px 44px;
    box-shadow: 8px 8px 0 var(--orange), 16px 16px 0 rgba(232,83,26,0.2);
    animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(32px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* logo area */
  .logo-area {
    text-align: center;
    margin-bottom: 36px;
  }

  .logo-jp {
    font-family: 'Zen Antique', serif;
    font-size: 13px;
    color: var(--green);
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-bottom: 6px;
    display: block;
    animation: fadeIn 0.8s 0.2s both;
  }

  .logo-en {
    font-family: 'Zen Antique', serif;
    font-size: 30px;
    color: var(--black);
    line-height: 1;
    letter-spacing: 1px;
    animation: fadeIn 0.8s 0.3s both;
  }

  .logo-en span {
    color: var(--orange);
  }

  .logo-sub {
    font-size: 11px;
    color: var(--warm);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 6px;
    display: block;
    animation: fadeIn 0.8s 0.4s both;
  }

  .divider {
    width: 40px;
    height: 2px;
    background: var(--orange);
    margin: 16px auto 0;
    animation: expand 0.8s 0.5s both;
  }

  @keyframes expand {
    from { width: 0; opacity: 0; }
    to   { width: 40px; opacity: 1; }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* form */
  .form-group {
    margin-bottom: 20px;
    animation: fadeIn 0.8s both;
  }

  .form-group:nth-child(1) { animation-delay: 0.5s; }
  .form-group:nth-child(2) { animation-delay: 0.6s; }

  label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--green);
    margin-bottom: 8px;
  }

  input {
    width: 100%;
    padding: 12px 16px;
    background: white;
    border: 1.5px solid #D8D0C4;
    border-radius: 2px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--black);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input:focus {
    border-color: var(--orange);
    box-shadow: 3px 3px 0 rgba(232,83,26,0.15);
  }

  input::placeholder { color: #C4BAB0; }

  /* role selector */
  .role-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--green);
    margin-bottom: 10px;
    display: block;
    animation: fadeIn 0.8s 0.65s both;
  }

  .role-group {
    display: flex;
    gap: 8px;
    margin-bottom: 28px;
    animation: fadeIn 0.8s 0.7s both;
  }

  .role-btn {
    flex: 1;
    padding: 9px 4px;
    background: white;
    border: 1.5px solid #D8D0C4;
    border-radius: 2px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: #8A7F74;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }

  .role-btn:hover { border-color: var(--orange); color: var(--orange); }

  .role-btn.active {
    background: var(--orange);
    border-color: var(--orange);
    color: white;
  }

  /* submit */
  .btn-login {
    width: 100%;
    padding: 14px;
    background: var(--black);
    color: var(--cream);
    border: none;
    border-radius: 2px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    animation: fadeIn 0.8s 0.75s both;
    position: relative;
    overflow: hidden;
  }

  .btn-login:hover {
    background: var(--orange);
    box-shadow: 4px 4px 0 rgba(232,83,26,0.3);
  }

  .btn-login:active { transform: translateY(1px); }

  .footer-note {
    text-align: center;
    margin-top: 24px;
    font-size: 11px;
    color: var(--warm);
    letter-spacing: 1px;
    animation: fadeIn 0.8s 0.85s both;
  }

  .tag {
    display: inline-block;
    background: var(--green);
    color: white;
    font-size: 9px;
    letter-spacing: 2px;
    padding: 3px 8px;
    border-radius: 1px;
    text-transform: uppercase;
    margin-bottom: 20px;
    animation: fadeIn 0.8s 0.15s both;
  }
</style>
</head>
<body>

<div class="bg">
  <div class="bg-shape s1"></div>
  <div class="bg-shape s2"></div>
  <div class="bg-shape s3"></div>
  <div class="bg-shape s4"></div>
  <div class="bg-shape s5"></div>
  <div class="bg-shape s6"></div>
</div>
<div class="noise"></div>

<div class="card">
  <div class="logo-area">
    <span class="tag">POS System</span>
    <span class="logo-jp">&#x85;&#x63a5;&#x30d0;&#x30e9; &middot; Japanese Surplus</span>
    <div class="logo-en"><span>Akaibara</span></div>
    <span class="logo-sub">Staff Portal</span>
    <div class="divider"></div>
  </div>

  <form onsubmit="return false;">
    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="you@akaibara.com" autocomplete="off">
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;">
    </div>

    <span class="role-label">Login as</span>
    <div class="role-group">
      <button class="role-btn active" onclick="setRole(this)">Admin</button>
      <button class="role-btn" onclick="setRole(this)">Cashier</button>
      <button class="role-btn" onclick="setRole(this)">Inspector</button>
    </div>

    <button class="btn-login" type="submit">Sign In</button>
  </form>

  <p class="footer-note">Akaibara Japanese Surplus Store &nbsp;&middot;&nbsp; Internal Use Only</p>
</div>

<script>
  function setRole(el) {
    document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
  }
</script>
</body>
</html>
